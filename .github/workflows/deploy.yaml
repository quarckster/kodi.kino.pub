name: deploy

on:
  push:
    branches:
      - master
    tags:
      - "*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Fix permissions
        run: chmod -R a+rw ${PWD}
      - name: Build an addon
        env:
          VERSION: ${{ github.ref_name }}
        run: make video_addon
      - name: List files
        run: ls -lh
      - name: Create a release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        # gh errors out if the asset file is missing, covering the old
        # action's fail_on_unmatched_files behaviour.
        run: gh release create "$VERSION" "video.kino.pub-$VERSION.zip" --generate-notes
      - name: Deploy to Netlify
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: make deploy
