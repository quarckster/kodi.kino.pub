name: ci

on:
  push:
    branches:
      - master
  pull_request:
    types: ["opened", "synchronize", "reopened"]
  create:

jobs:
  tests-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v3
        with:
          python-version: "3.10"
          architecture: "x64"
      - name: Install deps
        run: pip install -r requirements_dev.txt
      - name: Unit tests
        run: make test_unit

  tests-integration:
    runs-on: ubuntu-latest
    # Kodi 22 is not released yet, so it is tested against a nightly image and must not fail the CI.
    continue-on-error: ${{ matrix.kodi-version == '22' }}
    strategy:
      fail-fast: false
      matrix:
        kodi-version: ["20", "21", "22"]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v3
        with:
          python-version: "3.10"
          architecture: "x64"
      - name: Install deps
        run: pip install -r requirements_dev.txt
      - name: Pull conkodi container image
        run: podman pull ghcr.io/quarckster/conkodi:${{ matrix.kodi-version }}
      - name: Pull mockserver container image
        run: podman pull docker.io/mockserver/mockserver:mockserver-5.11.2
      - name: Integration tests
        env:
          KODI_VERSION: ${{ matrix.kodi-version }}
        run: make test_integration
      - name: Kodi logs analysis
        if: failure()
        run: podman logs kodi
      - name: Mockserver logs analysis
        if: failure()
        run: podman logs mockserver
